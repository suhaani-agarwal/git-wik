name: Bug report
description: Report a reproducible bug in git-wik
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: node -v
    validations:
      required: true

  - type: input
    id: gh
    attributes:
      label: GitHub CLI version
      placeholder: gh --version
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output/logs
      render: shell
